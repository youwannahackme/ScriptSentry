<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#08070d" />
    </radialGradient>
    
    <!-- Neon Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Shield Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background rounded circle -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />

  <!-- Shield Shape with Glow -->
  <path d="M256,70 C340,70 395,95 410,175 C410,290 330,380 256,430 C182,380 102,290 102,175 C117,95 172,70 256,70 Z" 
        fill="none" 
        stroke="url(#neonGrad)" 
        stroke-width="16" 
        filter="url(#glow)" 
        stroke-linejoin="round" />

  <!-- Inner Shield Accent -->
  <path d="M256,95 C320,95 365,115 378,175 C378,265 315,340 256,385 C197,340 134,265 134,175 C147,115 192,95 256,95 Z" 
        fill="#110f24" 
        opacity="0.8" />

  <!-- Code Bracket Symbol (</>) -->
  <g transform="translate(146, 186)" stroke="url(#neonGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left Bracket < -->
    <path d="M60,40 L10,70 L60,100" />
    
    <!-- Slash / -->
    <path d="M130,20 L90,120" />
    
    <!-- Right Bracket > -->
    <path d="M160,40 L210,70 L160,100" />
  </g>
</svg>
